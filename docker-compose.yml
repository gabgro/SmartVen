services:
  db:
    image: mysql:8.0
    container_name: smartven-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smartven
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./smart-ven-backend
      dockerfile: Dockerfile
    container_name: smartven-api
    restart: always
    ports:
      - "0.0.0.0:3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://root:root@db:3306/smartven"

  frontend:
    build:
      context: ./prototipo-frontend
      dockerfile: Dockerfile
    container_name: smartven-web
    ports:
      - "0.0.0.0:4200:80"
    restart: always